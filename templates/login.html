<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>

<body>
    <!--Navbar-->
    <nav class="bg-neutral-primary w-full z-20 top-0 start-0 border-b border-default">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="{{ url_for('inicio') }}" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="{{ url_for('static', filename='logo.svg') }}" class="h-7" alt="Flowbite Logo" />
            </a>
            <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse gap-4">

                <!-- Botón Deseados -->
                <a href="{{ url_for('deseados') }}"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base hover:bg-neutral-secondary-soft hover:text-red-500 focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
                    aria-label="Deseados">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </a>
                
                <!-- Botón Usuario -->
                <button type="button"
                    class="flex text-sm bg-neutral-primary rounded-full md:me-0 focus:ring-4 focus:ring-neutral-tertiary"
                    id="user-menu-button" aria-expanded="false" data-dropdown-toggle="user-dropdown"
                    data-dropdown-placement="bottom" aria-label="Usuario">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="6" stroke-width="1.5"></rect>
                        <circle cx="12" cy="9" r="3" stroke-width="1.5"></circle>
                        <path d="M6 20c1.5-2 4.5-3 6-3s4.5 1 6 3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
                
                <!-- Botón Carrito -->
                <a href="{{ url_for('inicio') }}" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary" aria-label="Carrito">
                    <svg class="w-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293a1 1 0 00.707 1.707H17" />
                    </svg>
                </a>
                
                
                <button data-collapse-toggle="navbar-user" type="button"
                    class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
                    aria-controls="navbar-user" aria-expanded="false">
                    <span class="sr-only">Open main menu</span>
                    <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                            d="M5 7h14M5 12h14M5 17h14" />
                    </svg>
                </button>
            </div>
            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-user">
                <ul
                    class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary">
                    <li>
                        <a href="{{ url_for('inicio') }}"
                            class="block py-2 px-3 text-white bg-brand rounded md:bg-transparent md:text-fg-brand md:p-0"
                            aria-current="page">Home</a>
                    </li>
                    <li>
                        <a href="{{ url_for('busqueda') }}"
                            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Categorias</a>
                    </li>
                    <li>
                        <a href="{{ url_for('inicio') }}"
                            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Ofertas</a>
                    </li>
                    <li>
                        <a href="{{ url_for('inicio') }}"
                            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Marcas</a>
                    </li>
                    <li>
                        <a href="{{ url_for('busqueda') }}"
                            class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-fg-brand md:p-0 md:dark:hover:bg-transparent">Buscar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="min-h-[calc(100vh)] bg-gray-50 flex items-center justify-center px-4 bg-cover bg-center" style="background-image: url( /static/imagenes/fondo5.jpg );" >
        <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-heading">Iniciar sesión</h1>
            </div>

            {% if error %}
            <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                {{ error }}
            </div>
            {% endif %}

            <form class="space-y-5" method="post" action="{{ url_for('login') }}">
                <div>
                    <label for="email" class="block text-sm font-medium text-heading mb-2">Correo electrónico</label>
                    <input id="email" name="email" type="email" placeholder="usuario@tienda.com"
                        class="w-full px-4 py-3 rounded-lg border border-default bg-white text-heading placeholder:text-body focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-heading mb-2">Contraseña</label>
                    <input id="password" name="password" type="password" placeholder="usuario123"
                        class="w-full px-4 py-3 rounded-lg border border-default bg-white text-heading placeholder:text-body focus:outline-none focus:ring-2 focus:ring-brand focus:border-brand">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 text-sm text-body">
                        <input type="checkbox" class="w-4 h-4 rounded border border-default text-brand focus:ring-brand">
                        Recordarme
                    </label>
                    <a href="#" class="text-sm text-brand hover:underline">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit"
                    class="w-full py-3 px-4 bg-black text-white font-semibold rounded-lg hover:bg-opacity-90 transition-colors">
                    Entrar
                </button>
            </form>

            <div class="mt-6 grid gap-3 text-sm text-body">
                <div class="rounded-lg border border-default p-3">
                    <p class="font-semibold text-heading">Usuario</p>
                    <p>usuario@tienda.com / usuario123</p>
                </div>
                <div class="rounded-lg border border-default p-3">
                    <p class="font-semibold text-heading">Administrador</p>
                    <p>admin@tienda.com / admin123</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
<!-- <script src="{{ url_for('static', filename='js/flowbite.js') }}"></script> -->
